<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Routinen">
<title>Routinen-Tracker v1.2</title>
<style>
:root {
  --purple:#7F77DD;--purple-light:#EEEDFE;--purple-mid:#AFA9EC;--purple-dark:#534AB7;--purple-darker:#3C3489;
  --green:#1D9E75;--green-light:#E1F5EE;--amber:#BA7517;--amber-light:#FAEEDA;
  --red-bg:#FCEBEB;--red-border:#F09595;--red-text:#A32D2D;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --bg:#f5f5f5;--card:#fff;--border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --radius:12px;--radius-sm:8px;--radius-pill:99px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root{
  --text:#f0f0f0;--text2:#aaa;--text3:#666;
  --bg:#111;--card:#1e1e1e;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
  --purple-light:#2a2750;--green-light:#0d2e22;--amber-light:#2a1e06;
  --red-bg:#2a1010;--red-border:#6b2020;--red-text:#f09595;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:var(--text)}
body{padding-top:calc(var(--safe-top) + 0px);padding-bottom:var(--safe-bottom)}
.app{max-width:430px;margin:0 auto;padding:16px 16px 32px}
h1{font-size:28px;font-weight:700;margin-bottom:4px}
.subtitle{font-size:13px;color:var(--text2);margin-bottom:20px}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.stat-box{background:var(--card);border-radius:var(--radius-sm);padding:10px 12px;border:0.5px solid var(--border)}
.stat-label{font-size:10px;color:var(--text2);margin-bottom:3px;font-weight:500}
.stat-val{font-size:22px;font-weight:600;color:var(--text)}
.stat-sub{font-size:10px;color:var(--text3);margin-top:1px}

/* Week nav */
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:14px;background:var(--card);border-radius:var(--radius);padding:8px 12px;border:0.5px solid var(--border)}
.nav-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:20px;padding:2px 6px;border-radius:6px;line-height:1}
.nav-btn:active{background:var(--border)}
.week-lbl{flex:1;text-align:center;font-size:13px;font-weight:600;color:var(--text)}

/* Routine card – overflow:visible so dropdown can escape */
.rcard{background:var(--card);border-radius:var(--radius);border:0.5px solid var(--border);margin-bottom:10px;position:relative}
.rcard-header{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer;border-radius:var(--radius) var(--radius) 0 0}
.drag-handle{color:var(--text3);font-size:18px;padding:2px;touch-action:none;flex-shrink:0;cursor:grab}
.rcard-icon{width:34px;height:34px;border-radius:8px;background:var(--purple-light);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.rcard-info{flex:1;min-width:0}
.rcard-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rcard-meta{font-size:11px;color:var(--text2);margin-top:1px}

/* Hamburger menu */
.rcard-actions{position:relative;flex-shrink:0}
.ham-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:22px;padding:4px 8px;border-radius:6px;line-height:1;display:flex;align-items:center;justify-content:center}
.ham-btn:active{background:var(--border);color:var(--text)}
.ham-menu{position:absolute;right:0;top:calc(100% + 4px);background:var(--card);border:0.5px solid var(--border2);border-radius:var(--radius-sm);box-shadow:0 4px 24px rgba(0,0,0,.18);z-index:300;min-width:154px;overflow:hidden}
.ham-item{display:flex;align-items:center;gap:8px;padding:12px 16px;font-size:14px;cursor:pointer;color:var(--text);white-space:nowrap}
.ham-item:active{background:var(--border)}
.ham-item.danger{color:#E24B4A}
.chevron{font-size:12px;color:var(--text3);transition:transform 0.2s;margin-left:2px}
.chevron.open{transform:rotate(180deg)}

/* Card body */
.rcard-body{border-top:0.5px solid var(--border);padding:12px 14px;border-radius:0 0 var(--radius) var(--radius);overflow:hidden}
.phase-tabs{display:flex;gap:6px;margin-bottom:10px}
.phase-tab{flex:1;padding:7px 0;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:none;font-size:11px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .15s}
.phase-tab.active{background:var(--purple-light);border-color:var(--purple-mid);color:var(--purple-darker)}
.phase-tab.sick-active{background:var(--amber-light)!important;border-color:var(--amber)!important;color:var(--amber)!important}
.phase-hint{font-size:11px;color:var(--text3);text-align:center;margin-bottom:10px}

/* Goal badge */
.goal-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.goal-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:var(--radius-pill);border:1px solid}
.goal-badge.met{background:var(--green-light);border-color:var(--green);color:var(--green)}
.goal-badge.partial{background:var(--amber-light);border-color:var(--amber);color:var(--amber)}
.goal-badge.missed{background:var(--red-bg);border-color:var(--red-border);color:var(--red-text)}
.goal-badge.pending{background:var(--purple-light);border-color:var(--purple-mid);color:var(--purple-darker)}
.sick-note{font-size:11px;color:var(--amber);font-weight:500}

/* Day pills */
.day-row{display:flex;gap:5px;justify-content:center;margin-bottom:12px}
.day-pill{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;user-select:none;transition:all .12s;position:relative}
.day-pill .dn{font-size:9px;font-weight:700;color:var(--text2)}
.day-pill .dd{font-size:9px;color:var(--text3)}
.day-pill.planned{border-color:var(--purple)}
.day-pill.planned .dn,.day-pill.planned .dd{color:var(--purple-dark)}
.day-pill.done{background:var(--purple);border-color:var(--purple)}
.day-pill.done .dn,.day-pill.done .dd{color:white}
.day-pill.sick{background:var(--amber-light);border-color:var(--amber)}
.day-pill.sick .dn{color:var(--amber);font-weight:700}
.day-pill.sick .dd{color:var(--amber);text-decoration:line-through}
.day-pill.is-today::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--purple)}
.day-pill.done.is-today::after{background:rgba(255,255,255,.7)}
.day-pill.sick.is-today::after{background:var(--amber)}
.day-pill:active{transform:scale(0.92)}

/* Week goal inline stepper */
.week-goal-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.week-goal-lbl{font-size:11px;color:var(--text2)}
.wg-stepper{display:flex;align-items:center;border:0.5px solid var(--border2);border-radius:var(--radius-pill);overflow:hidden;background:var(--bg)}
.wg-btn{background:none;border:none;cursor:pointer;font-size:16px;color:var(--purple);width:28px;height:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.wg-btn:active{background:var(--border)}
.wg-val{font-size:13px;font-weight:700;color:var(--text);min-width:38px;text-align:center}
.wg-fixed{font-size:13px;font-weight:700;color:var(--text2);padding:3px 12px;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius-pill)}
.form-hint{font-size:11px;color:var(--text3);margin:-8px 0 14px;line-height:1.4}

/* Progress */
.prog-wrap{margin-bottom:8px}
.prog-bg{background:var(--bg);border-radius:var(--radius-pill);height:5px;overflow:hidden}
.prog-fill{height:5px;border-radius:var(--radius-pill);transition:width .4s}
.prog-fill.met{background:var(--green)}
.prog-fill.partial{background:var(--amber)}
.prog-fill.missed{background:var(--red-text)}
.prog-fill.pending{background:var(--purple)}

/* History */
.hist-section{margin-top:10px;border-top:0.5px solid var(--border);padding-top:10px}
.hist-title{font-size:10px;font-weight:700;letter-spacing:.07em;color:var(--text3);text-transform:uppercase;margin-bottom:8px}
.hist-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.hist-kw{font-size:11px;font-weight:600;min-width:38px;color:var(--text2)}
.hist-pills{display:flex;gap:3px;flex:1}
.hp{width:22px;height:22px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:var(--text3)}
.hp.d{background:var(--purple);border-color:var(--purple);color:white}
.hp.m{background:var(--red-bg);border-color:var(--red-border);color:var(--red-text)}
.hp.s{background:var(--amber-light);border-color:var(--amber);color:var(--amber)}
.hist-score{font-size:11px;font-weight:600;min-width:40px;text-align:right;color:var(--text)}
.hist-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hist-dot.met{background:var(--green)}
.hist-dot.partial{background:var(--amber)}
.hist-dot.missed{background:var(--red-text)}
.hist-dot.nogoal{background:var(--border2)}

/* FAB */
.fab{position:fixed;bottom:calc(24px + var(--safe-bottom));right:20px;width:56px;height:56px;border-radius:50%;background:var(--purple);border:none;cursor:pointer;font-size:26px;color:white;display:flex;align-items:center;justify-content:center;z-index:100;transition:transform .15s}
.fab:active{transform:scale(0.93)}

/* Sheet */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end}
.sheet{background:var(--card);border-radius:20px 20px 0 0;padding:0 16px calc(24px + var(--safe-bottom));width:100%;max-height:90vh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:10px auto 16px}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:16px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.05em}
.form-input{width:100%;font-size:16px;padding:10px 12px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);margin-bottom:14px;-webkit-appearance:none}
.form-input:focus{outline:2px solid var(--purple);border-color:transparent}

/* iOS toggle */
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:2px 0}
.toggle-lbl{font-size:14px;color:var(--text);font-weight:500}
.ios-toggle{position:relative;width:44px;height:26px;flex-shrink:0;cursor:pointer}
.ios-toggle input{opacity:0;width:0;height:0;position:absolute}
.ios-slider{position:absolute;inset:0;border-radius:13px;background:var(--border2);transition:background .2s;cursor:pointer}
.ios-toggle input:checked+.ios-slider{background:var(--purple)}
.ios-slider::before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;border-radius:50%;background:white;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:transform .2s}
.ios-toggle input:checked+.ios-slider::before{transform:translateX(18px)}

/* Goal stepper */
.goal-stepper{display:flex;align-items:center;gap:0;margin-bottom:16px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;background:var(--bg)}
.step-btn{background:none;border:none;cursor:pointer;font-size:22px;font-weight:300;color:var(--purple);width:48px;height:44px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-btn:active{background:var(--border)}
.step-val{flex:1;text-align:center;font-size:16px;font-weight:700;color:var(--text)}
.step-lbl{font-size:12px;color:var(--text2);font-weight:400}

/* Icon grid */
.icon-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.ico-btn{width:40px;height:40px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:all .1s}
.ico-btn.sel{border-color:var(--purple);border-width:2px;background:var(--purple-light)}
.ico-btn:active{transform:scale(0.88)}
.ico-del{position:absolute;top:-5px;right:-5px;width:16px;height:16px;border-radius:50%;background:#E24B4A;color:white;font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center;cursor:pointer;line-height:1;border:1.5px solid var(--card)}
.ico-btn.manage-mode .ico-del{display:flex}
.emoji-add-row{display:flex;gap:8px;margin-bottom:16px}
.emoji-inp{flex:1;font-size:22px;padding:8px 10px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);text-align:center;-webkit-appearance:none}
.emoji-inp:focus{outline:2px solid var(--purple);border-color:transparent}
.btn-add-emoji{background:var(--purple);color:white;border:none;border-radius:var(--radius-sm);padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.day-sel-row{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.ds-btn{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border2);background:none;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .12s}
.ds-btn.sel{background:var(--purple);border-color:var(--purple);color:white}
.ds-btn:active{transform:scale(0.88)}
.btn-row{display:flex;gap:8px;margin-top:4px}
.btn-main{flex:2;background:var(--purple);color:white;border:none;border-radius:var(--radius-sm);padding:13px;font-size:15px;font-weight:700;cursor:pointer}
.btn-main:active{background:var(--purple-dark)}
.btn-cancel{flex:1;background:none;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:13px;font-size:15px;font-weight:600;color:var(--text2);cursor:pointer}
.btn-cancel:active{background:var(--border)}
.manage-toggle{font-size:12px;color:var(--purple);cursor:pointer;margin-bottom:10px;font-weight:600}
.section-sep{height:0.5px;background:var(--border);margin:14px 0}

/* Header & Settings-Menü */
.header-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.settings-wrap{position:relative;flex-shrink:0;margin-top:6px}
.settings-btn{background:none;border:0.5px solid var(--border2);border-radius:var(--radius-sm);cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);padding:7px 11px;line-height:1;white-space:nowrap}
.settings-btn:active{background:var(--border)}
.settings-menu{position:absolute;right:0;top:calc(100% + 4px);background:var(--card);border:0.5px solid var(--border2);border-radius:var(--radius-sm);box-shadow:0 4px 24px rgba(0,0,0,.18);z-index:300;min-width:160px;overflow:hidden}
.toast{position:fixed;bottom:calc(90px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:#222;color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:var(--radius-pill);z-index:999;opacity:0;transition:opacity .25s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const DAYS=['Mo','Di','Mi','Do','Fr','Sa','So'];
const LS_KEY='routinen_tracker_v1';
const DEFAULT_ICONS=['🏋️','🧘','📚','✍️','🎯','🧠','💧','🥗','😴','🚴','🎵','🧹','💼','🌿','🛁','🐕','🏃','🍎','💪','🔬','🧴','🫀','🦷','☕','🛒'];

// ── Migration ────────────────────────────────────────────────────────────────
function migrate(raw){
  if(!raw.icons)raw.icons=[...DEFAULT_ICONS];
  if(!raw.routines)raw.routines=[];
  raw.routines.forEach(r=>{
    if(!r.phase)r.phase={};
    if(!r.weeks)r.weeks={};
    if(typeof r.goalPerWeek!=='number')r.goalPerWeek=3;
    if(typeof r.hasGoal!=='boolean')r.hasGoal=true;
    if(typeof r.flexibleGoal!=='boolean')r.flexibleGoal=false; // v1.2: Ziel je Woche anpassbar
    if(!Array.isArray(r.startDays))r.startDays=[];              // v1.2: Starttage-Vorlage
    if(typeof r.showHistory!=='boolean')r.showHistory=false;     // v1.3: Historie ein/aus
    Object.values(r.weeks).forEach(w=>{
      if(!w.sick)w.sick=[];
    });
  });
  return raw;
}

function loadState(){
  try{const raw=localStorage.getItem(LS_KEY);if(raw)return migrate(JSON.parse(raw));}catch(e){}
  return null;
}
function saveState(){try{localStorage.setItem(LS_KEY,JSON.stringify(state));}catch(e){}}

let saved=loadState();
let nextId=saved?(saved.nextId||2):2;
let state=saved||{
  weekOffset:0,
  icons:[...DEFAULT_ICONS],
  routines:[{id:1,name:'Training (PT/Maschine)',icon:'🏋️',goalPerWeek:3,hasGoal:true,flexibleGoal:false,startDays:[],showHistory:false,phase:{},weeks:{}}]
};

let ui={sheet:null,sheetData:null,manageIcons:false,expanded:null,menuOpen:null,settingsOpen:false};
let _weekInitialized=false; // gesetzt wenn getWk eine neue Woche mit Starttagen anlegt

// ── Helpers ──────────────────────────────────────────────────────────────────
function getMonday(offset){
  const t=new Date();t.setHours(0,0,0,0);
  const d=t.getDay();const diff=d===0?-6:1-d;
  t.setDate(t.getDate()+diff+offset*7);return t;
}
function getWeekDates(offset){
  const m=getMonday(offset);
  return Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d;});
}
function isoWeek(d){
  const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  t.setUTCDate(t.getUTCDate()+4-(t.getUTCDay()||7));
  const y=new Date(Date.UTC(t.getUTCFullYear(),0,1));
  return Math.ceil(((t-y)/86400000+1)/7);
}
function weekKey(offset){
  const m=getMonday(offset);
  return m.getFullYear()+'-W'+String(isoWeek(m)).padStart(2,'0');
}
function fmtRange(offset){
  const ds=getWeekDates(offset);
  const f=d=>d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});
  return 'KW '+isoWeek(ds[0])+' · '+f(ds[0])+'–'+f(ds[6]);
}
function getWk(r,offset){
  const k=weekKey(offset);
  if(!r.weeks[k]){
    r.weeks[k]={planned:[],done:[],sick:[]};
    // Starttage nur für aktuelle und zukünftige Wochen beim ersten Aufruf setzen
    if(offset>=0&&r.startDays&&r.startDays.length>0){
      r.weeks[k].planned=[...r.startDays];
      _weekInitialized=true; // wird nach render() persistiert
    }
  }
  if(!r.weeks[k].sick)r.weeks[k].sick=[];
  return r.weeks[k];
}
function getPhase(r,offset){
  const k=weekKey(offset);if(!r.phase[k])r.phase[k]='plan';return r.phase[k];
}
function setPhase(r,offset,v){r.phase[weekKey(offset)]=v;}

// Effektives Wochenziel: bei flexibleGoal wird wk.goal (je Woche) bevorzugt, sonst Fixwert
function effectiveGoal(r,wk){
  if(!r.hasGoal)return null;
  const goal=(r.flexibleGoal&&typeof wk.goal==='number')?wk.goal:(r.goalPerWeek||3);
  const sickPlanned=(wk.sick||[]).filter(d=>wk.planned.includes(d)).length;
  return Math.max(0,goal-sickPlanned); // 0 ist erlaubt (= diese Woche kein Ziel nötig)
}

function goalStatus(done,effGoal,isCurrentWeek){
  if(isCurrentWeek)return done>=effGoal?'met':'pending';
  if(done>=effGoal)return'met';
  if(done>=effGoal*0.5)return'partial';
  return'missed';
}
function goalLabel(status){
  if(status==='met')return'✓ Ziel erreicht';
  if(status==='partial')return'~ Teilweise';
  if(status==='missed')return'✗ Verfehlt';
  return'Auf dem Weg';
}

function routineStats(r){
  let tp=0,td=0,weeksMetGoal=0,weeksCounted=0;
  const currKey=weekKey(state.weekOffset);
  Object.entries(r.weeks).forEach(([k,w])=>{
    tp+=w.planned.length;td+=w.done.length;
    if(k!==currKey&&w.planned.length>0){
      weeksCounted++;
      if(r.hasGoal){
        const wGoal=(r.flexibleGoal&&typeof w.goal==='number')?w.goal:(r.goalPerWeek||3);
        const effG=Math.max(0,wGoal-(w.sick||[]).filter(d=>w.planned.includes(d)).length);
        if(effG>0&&w.done.length>=effG)weeksMetGoal++;
      }
    }
  });
  return{tp,td,weeksMetGoal,weeksCounted};
}

// Globale Stats: Gesamtquote nur Vergangenheit + heute (keine Zukunft)
function globalStats(){
  const todayDate=new Date();todayDate.setHours(0,0,0,0);
  const todayDayIdx=(todayDate.getDay()+6)%7; // Mo=0 … So=6
  const realWeekKey=weekKey(0);               // immer die echte aktuelle Woche
  let tp=0,td=0;const wks=new Set();
  let onTrack=0,goalRoutines=0;
  state.routines.forEach(r=>{
    Object.entries(r.weeks).forEach(([k,w])=>{
      if(k<realWeekKey){tp+=w.planned.length;td+=w.done.length;}
      else if(k===realWeekKey){
        tp+=w.planned.filter(d=>d<=todayDayIdx).length;
        td+=w.done.filter(d=>d<=todayDayIdx).length;
      }
    });
    Object.keys(r.weeks).forEach(k=>{if(r.weeks[k].planned.length>0)wks.add(k);});
    if(r.hasGoal){
      goalRoutines++;
      const wk=getWk(r,state.weekOffset);
      const effG=effectiveGoal(r,wk);
      if(effG!==null&&effG>0&&wk.done.length>=effG)onTrack++;
    }
  });
  return{tp,td,weeks:wks.size,onTrack,goalRoutines};
}

function historyKeys(r){
  const curr=weekKey(state.weekOffset);
  return Object.keys(r.weeks).filter(k=>k!==curr&&r.weeks[k].planned.length>0).sort().reverse().slice(0,6);
}
function persist(){state.nextId=nextId;saveState();}

// ── Export / Import ──────────────────────────────────────────────────────────
function showToast(msg,duration=2400){
  const t=document.getElementById('toast');if(!t)return;
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),duration);
}
function exportData(){
  const payload={exportedAt:new Date().toISOString(),appVersion:'routinen_tracker_v1',data:state};
  const json=JSON.stringify(payload,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const date=new Date().toISOString().slice(0,10);
  const a=document.createElement('a');
  a.href=url;a.download=`routinen-backup-${date}.json`;a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Backup gespeichert');
}
function importData(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=JSON.parse(e.target.result);
      const raw=parsed.data||parsed;
      if(!raw.routines||!Array.isArray(raw.routines)){showToast('⚠ Ungültige Backup-Datei');return;}
      const confirmed=confirm(
        `Backup vom ${parsed.exportedAt?new Date(parsed.exportedAt).toLocaleDateString('de-DE'):'unbekannten Datum'} laden?\n\n`+
        `${raw.routines.length} Routine(n) gefunden.\n\nAktuelle Daten werden überschrieben.`
      );
      if(!confirmed)return;
      const migrated=migrate(raw);
      Object.assign(state,migrated);
      nextId=state.nextId||(Math.max(0,...state.routines.map(r=>r.id))+1);
      persist();
      ui.expanded=new Set(state.routines.map(r=>r.id));
      render();
      showToast(`✓ ${state.routines.length} Routine(n) importiert`);
    }catch(err){showToast('⚠ Datei konnte nicht gelesen werden');}
  };
  reader.readAsText(file);
}

// ── Render ───────────────────────────────────────────────────────────────────
function render(){
  _weekInitialized=false;
  const today=new Date();today.setHours(0,0,0,0);
  const dates=getWeekDates(state.weekOffset);
  const gs=globalStats();
  const app=document.getElementById('app');
  const onTrackStr=gs.goalRoutines>0?`${gs.onTrack}/${gs.goalRoutines}`:'–';
  const isCurrentOrPastWeek=state.weekOffset<=0;

  let html=`<div class="header-row">
    <div><h1>Routinen</h1><p class="subtitle">Wochenplanung & Tracking</p></div>
    <div class="settings-wrap">
      <button class="settings-btn" id="btn-settings">⚙ Backup</button>
      ${ui.settingsOpen?`<div class="settings-menu" id="settings-menu">
        <div class="ham-item" id="btn-export">⬆&nbsp; Exportieren</div>
        <div class="ham-item" id="btn-import">⬇&nbsp; Importieren</div>
        <div class="ham-item danger" id="btn-reset">🗑&nbsp; Daten zurücksetzen</div>
      </div>`:''}
    </div>
  </div>`;
  html+=`<div class="stats-grid">
    <div class="stat-box"><div class="stat-label">Erledigt</div><div class="stat-val">${gs.td}</div><div class="stat-sub">Einheiten gesamt</div></div>
    <div class="stat-box"><div class="stat-label">Auf Kurs</div><div class="stat-val">${onTrackStr}</div><div class="stat-sub">Routinen diese Woche</div></div>
    <div class="stat-box"><div class="stat-label">Gesamtquote</div><div class="stat-val">${gs.tp>0?Math.round(gs.td/gs.tp*100):0}%</div><div class="stat-sub">geplant→erledigt</div></div>
  </div>`;
  html+=`<div class="week-nav">
    <button class="nav-btn" id="btn-prev">‹</button>
    <span class="week-lbl">${fmtRange(state.weekOffset)}</span>
    <button class="nav-btn" id="btn-next">›</button>
  </div>`;

  if(!ui.expanded)ui.expanded=new Set(state.routines.map(r=>r.id));

  state.routines.forEach(r=>{
    const wk=getWk(r,state.weekOffset);
    const phase=getPhase(r,state.weekOffset);
    const isCurrentWeek=state.weekOffset===0;
    const effG=effectiveGoal(r,wk);
    const status=effG!==null?goalStatus(wk.done.length,effG,isCurrentWeek):null;
    const pct=effG===null?0:effG===0?100:Math.min(100,Math.round(wk.done.length/effG*100));
    const {td,weeksMetGoal,weeksCounted}=routineStats(r);
    const hkeys=historyKeys(r);
    const isOpen=ui.expanded.has(r.id);
    const menuOpen=ui.menuOpen===r.id;
    const currentWeekGoal=(r.flexibleGoal&&typeof wk.goal==='number')?wk.goal:(r.goalPerWeek||3);

    const metaStr=!r.hasGoal
      ?`${td} Einheiten · kein Wochenziel`
      :currentWeekGoal===0
        ?`${td} Einheiten · kein Ziel diese Woche`
        :`Ziel: ${currentWeekGoal}/Woche · ${weeksCounted>0?Math.round(weeksMetGoal/weeksCounted*100):0}% Zielquote`;

    html+=`<div class="rcard" data-rid="${r.id}" draggable="true">
      <div class="rcard-header" data-toggle="${r.id}">
        <span class="drag-handle">⠿</span>
        <div class="rcard-icon">${r.icon}</div>
        <div class="rcard-info">
          <div class="rcard-name">${r.name}</div>
          <div class="rcard-meta">${metaStr}</div>
        </div>
        <div class="rcard-actions">
          <button class="ham-btn" data-ham="${r.id}" title="Optionen">⋮</button>
          ${menuOpen?`<div class="ham-menu" id="ham-menu-${r.id}">
            <div class="ham-item" data-edit="${r.id}">✏️&nbsp; Bearbeiten</div>
            <div class="ham-item danger" data-del="${r.id}">🗑&nbsp; Löschen</div>
          </div>`:''}
        </div>
        <span class="chevron${isOpen?' open':''}">▼</span>
      </div>`;

    if(isOpen){
      const phaseHints={
        plan:'Tippe auf Tage, die du einplanen möchtest',
        track:'Tippe auf geplante Tage, um sie abzuhaken',
        sick:'Tippe auf Tage zum Markieren als Ausfall (Krankheit / Urlaub)'
      };
      html+=`<div class="rcard-body">
        <div class="phase-tabs">
          <button class="phase-tab${phase==='plan'?' active':''}" data-phase="${r.id}" data-val="plan">📅 Planen</button>
          <button class="phase-tab${phase==='track'?' active':''}" data-phase="${r.id}" data-val="track">✅ Abhaken</button>
          <button class="phase-tab${phase==='sick'?' active sick-active':''}" data-phase="${r.id}" data-val="sick">🤒 Ausfall</button>
        </div>
        <div class="phase-hint">${phaseHints[phase]||''}</div>
        <div class="day-row">`;

      dates.forEach((date,i)=>{
        const isP=wk.planned.includes(i);
        const isD=wk.done.includes(i);
        const isS=wk.sick.includes(i);
        const isToday=date.getTime()===today.getTime();
        let cls='day-pill';
        if(isS)cls+=' sick';
        else if(isD)cls+=' done';
        else if(isP)cls+=' planned';
        if(isToday)cls+=' is-today';
        html+=`<div class="${cls}" data-dp="${r.id}" data-di="${i}">
          <span class="dn">${DAYS[i]}</span><span class="dd">${date.getDate()}</span>
        </div>`;
      });

      html+=`</div>`;

      // Wochenziel-Zeile: bei flexiblem Ziel immer sichtbar (auch bei 0), sonst ab ≥ 1
      if(r.hasGoal&&effG!==null){
        if(r.flexibleGoal){
          html+=`<div class="week-goal-row">
            <span class="week-goal-lbl">Wochenziel</span>
            <div class="wg-stepper">
              <button class="wg-btn" data-wg-down="${r.id}">−</button>
              <span class="wg-val">${currentWeekGoal}</span>
              <button class="wg-btn" data-wg-up="${r.id}">+</button>
            </div>
          </div>`;
        }else if(currentWeekGoal>=1){
          html+=`<div class="week-goal-row">
            <span class="week-goal-lbl">Wochenziel</span>
            <span class="wg-fixed">${currentWeekGoal}</span>
          </div>`;
        }
        // Badge + Balken: ab gesetztem Ziel ≥ 1, aktuelle/vergangene Woche
        if(currentWeekGoal>=1&&isCurrentOrPastWeek){
          html+=`<div class="goal-row">
            <span class="goal-badge ${status}">${goalLabel(status)}</span>
          </div>
          <div class="prog-wrap">
            <div class="prog-bg"><div class="prog-fill ${status}" style="width:${pct}%"></div></div>
          </div>`;
        }
      }

      if(r.showHistory&&hkeys.length>0){
        html+=`<div class="hist-section"><div class="hist-title">Historie</div>`;
        hkeys.forEach(k=>{
          const w=r.weeks[k];
          if(!w.sick)w.sick=[];
          const knum=k.split('-W')[1];
          const effGH=r.hasGoal?Math.max(0,((r.flexibleGoal&&typeof w.goal==='number')?w.goal:(r.goalPerWeek||3))-w.sick.filter(d=>w.planned.includes(d)).length):null;
          const hStatus=(effGH&&effGH>0)?goalStatus(w.done.length,effGH,false):'nogoal';
          html+=`<div class="hist-row">
            <span class="hist-kw">KW ${knum}</span>
            <div class="hist-pills">`;
          DAYS.forEach((_,i)=>{
            const isD2=w.done.includes(i);
            const isS2=w.sick.includes(i);
            const isM=w.planned.includes(i)&&!isD2&&!isS2;
            html+=`<div class="hp${isS2?' s':isD2?' d':isM?' m':''}">${DAYS[i]}</div>`;
          });
          html+=`</div>
            <div class="hist-dot ${hStatus}"></div>
            <span class="hist-score">${r.hasGoal&&effGH?`${w.done.length}/${effGH}`:w.done.length}</span>
          </div>`;
        });
        html+=`</div>`;
      }
      html+=`</div>`;
    }
    html+=`</div>`;
  });

  html+=`<div style="height:80px"></div>`;
  html+=`<button class="fab" id="fab-add">+</button>`;
  html+=`<div class="toast" id="toast"></div>`;
  html+=`<input type="file" id="import-file" accept=".json" style="display:none">`;

  if(ui.sheet)html+=renderSheet();
  app.innerHTML=html;
  bindEvents();
  if(_weekInitialized)persist(); // neu angelegte Wochen mit Starttagen sofort speichern
}

function renderSheet(){
  const d=ui.sheetData;
  let html=`<div class="sheet-bg" id="sheet-bg"><div class="sheet"><div class="sheet-handle"></div>`;
  html+=`<div class="sheet-title">${d.mode==='add'?'Neue Routine':'Routine bearbeiten'}</div>`;
  html+=`<label class="form-label">Name</label>
    <input class="form-input" id="s-name" type="text" value="${d.name||''}" placeholder="z. B. Lesen, Meditation …">`;

  // Wochenziel-Block
  html+=`<label class="form-label">Wochenziel</label>`;
  html+=`<div class="toggle-row">
      <span class="toggle-lbl">Wochenziel aktivieren</span>
      <label class="ios-toggle">
        <input type="checkbox" id="s-has-goal"${d.hasGoal!==false?' checked':''}>
        <span class="ios-slider"></span>
      </label>
    </div>`;
  if(d.hasGoal!==false){
    html+=`<div class="goal-stepper">
      <button class="step-btn" id="step-down">−</button>
      <span class="step-val" id="step-val">${d.goalPerWeek}&thinsp;<span class="step-lbl">Einheiten/Woche</span></span>
      <button class="step-btn" id="step-up">+</button>
    </div>`;
    html+=`<div class="toggle-row">
      <span class="toggle-lbl">Wochenziel flexibel</span>
      <label class="ios-toggle">
        <input type="checkbox" id="s-flexible-goal"${d.flexibleGoal?' checked':''}>
        <span class="ios-slider"></span>
      </label>
    </div>
    <p class="form-hint">Initialwert kann je Woche direkt in der Karte angepasst werden</p>`;
  }

  html+=`<label class="form-label">Symbol</label>
    <div class="manage-toggle" id="toggle-manage">${ui.manageIcons?'✓ Fertig':'✏️ Symbole verwalten'}</div>
    <div class="icon-grid">`;
  state.icons.forEach((ic,idx)=>{
    const isSel=d.icon===ic;
    const mgm=ui.manageIcons?' manage-mode':'';
    html+=`<div class="ico-btn${isSel?' sel':''}${mgm}" data-pick="${ic}">${ic}<span class="ico-del" data-rmico="${idx}">×</span></div>`;
  });
  html+=`</div><div class="section-sep"></div>
    <label class="form-label">Eigenes Emoji hinzufügen</label>
    <div class="emoji-add-row">
      <input class="emoji-inp" id="emoji-inp" type="text" placeholder="🎾" maxlength="4">
      <button class="btn-add-emoji" id="btn-add-emoji">Hinzufügen</button>
    </div>
    <label class="form-label">Starttage (Vorlage je Woche)</label>
    <div class="day-sel-row">`;
  DAYS.forEach((day,i)=>{html+=`<button class="ds-btn${d.days.includes(i)?' sel':''}" data-dsel="${i}">${day}</button>`;});
  html+=`</div>
    <div class="section-sep"></div>
    <label class="form-label">Anzeige</label>
    <div class="toggle-row">
      <span class="toggle-lbl">Historie einblenden</span>
      <label class="ios-toggle">
        <input type="checkbox" id="s-show-history"${d.showHistory?' checked':''}>
        <span class="ios-slider"></span>
      </label>
    </div>
    <div class="btn-row">
      <button class="btn-main" id="btn-sheet-save">${d.mode==='add'?'Hinzufügen':'Speichern'}</button>
      <button class="btn-cancel" id="btn-sheet-cancel">Abbrechen</button>
    </div></div></div>`;
  return html;
}

// ── Events ───────────────────────────────────────────────────────────────────
function bindEvents(){
  const el=id=>document.getElementById(id);
  const q=s=>document.querySelectorAll(s);
  const saveName=()=>{const n=el('s-name');if(n&&ui.sheetData)ui.sheetData.name=n.value;};

  el('btn-prev')&&(el('btn-prev').onclick=()=>{state.weekOffset--;persist();render();});
  el('btn-next')&&(el('btn-next').onclick=()=>{state.weekOffset++;persist();render();});
  el('btn-reset')&&(el('btn-reset').onclick=e=>{
    e.stopPropagation();
    ui.settingsOpen=false;render();
    const ok=confirm(
      'Alle Daten unwiderruflich löschen?\n\n' +
      'Routinen, Wochen-Einträge und Einstellungen werden vollständig entfernt. ' +
      'Ein vorher erstelltes Backup kann über „Importieren" wiederhergestellt werden.'
    );
    if(!ok)return;
    try{localStorage.removeItem(LS_KEY);}catch(e){}
    // State auf Ausgangswert zurücksetzen
    state={weekOffset:0,icons:[...DEFAULT_ICONS],routines:[]};
    nextId=1;
    ui={sheet:null,sheetData:null,manageIcons:false,expanded:new Set(),menuOpen:null,settingsOpen:false};
    persist();render();
    showToast('✓ Alle Daten gelöscht');
  });
  el('btn-settings')&&(el('btn-settings').onclick=e=>{
    e.stopPropagation();ui.settingsOpen=!ui.settingsOpen;render();
  });
  el('btn-export')&&(el('btn-export').onclick=e=>{e.stopPropagation();ui.settingsOpen=false;exportData();render();});
  el('btn-import')&&(el('btn-import').onclick=e=>{e.stopPropagation();ui.settingsOpen=false;render();el('import-file')&&el('import-file').click();});
  el('import-file')&&(el('import-file').onchange=e=>{importData(e.target.files[0]);e.target.value='';});

  el('fab-add')&&(el('fab-add').onclick=()=>{
    ui.sheet='add';ui.manageIcons=false;ui.menuOpen=null;
    ui.sheetData={mode:'add',name:'',icon:state.icons[0]||'🏋️',goalPerWeek:3,hasGoal:true,flexibleGoal:false,showHistory:false,days:[0,2,4]};
    render();setTimeout(()=>el('s-name')&&el('s-name').focus(),80);
  });

  // Hamburger button: toggle dropdown
  q('[data-ham]').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      const rid=parseInt(btn.dataset.ham);
      ui.menuOpen=ui.menuOpen===rid?null:rid;
      render();
    };
  });

  // Card expand/collapse
  q('[data-toggle]').forEach(h=>{
    h.onclick=e=>{
      if(e.target.closest('[data-ham],[data-edit],[data-del],[data-phase],[data-dp],.drag-handle,.ham-menu'))return;
      const rid=parseInt(h.dataset.toggle);
      if(!ui.expanded)ui.expanded=new Set();
      if(ui.expanded.has(rid))ui.expanded.delete(rid);else ui.expanded.add(rid);
      render();
    };
  });

  // Week-Goal stepper (inline in Karte, je Woche)
  q('[data-wg-down]').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      const r=state.routines.find(x=>x.id===parseInt(btn.dataset.wgDown));if(!r)return;
      const wk=getWk(r,state.weekOffset);
      const cur=typeof wk.goal==='number'?wk.goal:(r.goalPerWeek||3);
      if(cur>0){wk.goal=cur-1;persist();render();}
    };
  });
  q('[data-wg-up]').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      const r=state.routines.find(x=>x.id===parseInt(btn.dataset.wgUp));if(!r)return;
      const wk=getWk(r,state.weekOffset);
      const cur=typeof wk.goal==='number'?wk.goal:(r.goalPerWeek||3);
      if(cur<7){wk.goal=cur+1;persist();render();}
    };
  });

  // Phase tabs
  q('[data-phase]').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      const r=state.routines.find(x=>x.id===parseInt(btn.dataset.phase));
      if(r){setPhase(r,state.weekOffset,btn.dataset.val);persist();render();}
    };
  });

  // Day pills: plan / track / sick
  q('[data-dp]').forEach(pill=>{
    pill.onclick=e=>{
      e.stopPropagation();
      const r=state.routines.find(x=>x.id===parseInt(pill.dataset.dp));if(!r)return;
      const di=parseInt(pill.dataset.di);
      const wk=getWk(r,state.weekOffset);
      const phase=getPhase(r,state.weekOffset);
      if(phase==='plan'){
        if(wk.planned.includes(di)){
          wk.planned=wk.planned.filter(d=>d!==di);
          wk.done=wk.done.filter(d=>d!==di);
          wk.sick=wk.sick.filter(d=>d!==di);
        }else{
          wk.planned.push(di);
        }
      }else if(phase==='track'){
        if(!wk.planned.includes(di))return;
        if(wk.done.includes(di))wk.done=wk.done.filter(d=>d!==di);
        else wk.done.push(di);
      }else if(phase==='sick'){
        // Beliebige Tage als Ausfall markieren (auch nicht geplante)
        if(wk.sick.includes(di)){
          wk.sick=wk.sick.filter(d=>d!==di);
        }else{
          wk.sick.push(di);
          wk.done=wk.done.filter(d=>d!==di); // Ausfalltag = nicht erledigt
        }
      }
      persist();render();
    };
  });

  // Edit (from hamburger menu)
  q('[data-edit]').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      const r=state.routines.find(x=>x.id===parseInt(btn.dataset.edit));if(!r)return;
      ui.sheet='edit';ui.manageIcons=false;ui.menuOpen=null;
      ui.sheetData={mode:'edit',id:r.id,name:r.name,icon:r.icon,goalPerWeek:r.goalPerWeek||3,hasGoal:r.hasGoal!==false,flexibleGoal:r.flexibleGoal===true,showHistory:r.showHistory===true,days:r.startDays?[...r.startDays]:[]};
      render();
    };
  });

  // Delete (from hamburger menu)
  q('[data-del]').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      if(confirm('Routine löschen?')){
        state.routines=state.routines.filter(x=>x.id!==parseInt(btn.dataset.del));
        ui.menuOpen=null;persist();render();
      }
    };
  });

  if(ui.sheet){
    el('sheet-bg')&&(el('sheet-bg').onclick=e=>{if(e.target===el('sheet-bg')){ui.sheet=null;render();}});
    el('btn-sheet-cancel')&&(el('btn-sheet-cancel').onclick=()=>{ui.sheet=null;render();});

    // hasGoal toggle
    el('s-has-goal')&&(el('s-has-goal').onchange=()=>{
      saveName();ui.sheetData.hasGoal=el('s-has-goal').checked;render();
    });

    // flexibleGoal toggle
    el('s-flexible-goal')&&(el('s-flexible-goal').onchange=()=>{
      saveName();ui.sheetData.flexibleGoal=el('s-flexible-goal').checked;render();
    });

    // showHistory toggle
    el('s-show-history')&&(el('s-show-history').onchange=()=>{
      saveName();ui.sheetData.showHistory=el('s-show-history').checked;
    });

    // goalPerWeek stepper (Initialwert)
    el('step-down')&&(el('step-down').onclick=()=>{
      saveName();if(ui.sheetData.goalPerWeek>1)ui.sheetData.goalPerWeek--;render();
    });
    el('step-up')&&(el('step-up').onclick=()=>{
      saveName();if(ui.sheetData.goalPerWeek<7)ui.sheetData.goalPerWeek++;render();
    });

    el('toggle-manage')&&(el('toggle-manage').onclick=()=>{ui.manageIcons=!ui.manageIcons;saveName();render();});

    q('[data-pick]').forEach(b=>{
      b.onclick=e=>{
        if(e.target.closest('[data-rmico]'))return;
        ui.sheetData.icon=b.dataset.pick;saveName();render();
      };
    });
    q('[data-rmico]').forEach(btn=>{
      btn.onclick=e=>{
        e.stopPropagation();
        const idx=parseInt(btn.dataset.rmico);
        const ic=state.icons[idx];
        if(state.routines.some(r=>r.icon===ic)){alert('Dieses Symbol wird von einer Routine verwendet.');return;}
        state.icons.splice(idx,1);
        if(ui.sheetData.icon===ic)ui.sheetData.icon=state.icons[0]||'';
        saveName();persist();render();
      };
    });
    el('btn-add-emoji')&&(el('btn-add-emoji').onclick=()=>{
      const inp=el('emoji-inp');if(!inp)return;
      const val=inp.value.trim();if(!val)return;
      if(!state.icons.includes(val))state.icons.push(val);
      ui.sheetData.icon=val;saveName();persist();render();
    });
    q('[data-dsel]').forEach(b=>{
      b.onclick=()=>{
        const i=parseInt(b.dataset.dsel);
        const d=ui.sheetData.days;
        if(d.includes(i))ui.sheetData.days=d.filter(x=>x!==i);else ui.sheetData.days=[...d,i].sort();
        saveName();render();
      };
    });
    el('btn-sheet-save')&&(el('btn-sheet-save').onclick=()=>{
      const name=(el('s-name').value||'').trim();
      if(!name){el('s-name').focus();return;}
      const d=ui.sheetData;
      if(d.mode==='add'){
        const r={id:nextId++,name,icon:d.icon,goalPerWeek:d.goalPerWeek,hasGoal:d.hasGoal!==false,flexibleGoal:d.flexibleGoal===true,showHistory:d.showHistory===true,startDays:[...d.days],phase:{},weeks:{}};
        state.routines.push(r);
        const wk=getWk(r,state.weekOffset); // auto-füllt Starttage wenn offset>=0
        // Bei vergangenen Wochen manuell befüllen (getWk übernimmt das nicht für offset<0)
        if(state.weekOffset<0){d.days.forEach(i=>{if(!wk.planned.includes(i))wk.planned.push(i);});}
      }else{
        const r=state.routines.find(x=>x.id===d.id);
        if(r){r.name=name;r.icon=d.icon;r.goalPerWeek=d.goalPerWeek;r.hasGoal=d.hasGoal!==false;r.flexibleGoal=d.flexibleGoal===true;r.showHistory=d.showHistory===true;r.startDays=[...d.days];}
      }
      ui.sheet=null;persist();render();
    });
  }

  // Drag & Drop
  let dragSrcId=null;
  q('.rcard[data-rid]').forEach(card=>{
    card.addEventListener('dragstart',e=>{dragSrcId=parseInt(card.dataset.rid);card.style.opacity='.45';e.dataTransfer.effectAllowed='move';});
    card.addEventListener('dragend',()=>{card.style.opacity='';q('.rcard').forEach(c=>c.style.borderColor='');});
    card.addEventListener('dragover',e=>{e.preventDefault();card.style.borderColor='var(--purple)';});
    card.addEventListener('dragleave',()=>{card.style.borderColor='';});
    card.addEventListener('drop',e=>{
      e.preventDefault();card.style.borderColor='';
      const toId=parseInt(card.dataset.rid);
      if(!dragSrcId||dragSrcId===toId)return;
      const fi=state.routines.findIndex(x=>x.id===dragSrcId);
      const ti=state.routines.findIndex(x=>x.id===toId);
      if(fi<0||ti<0)return;
      const moved=state.routines.splice(fi,1)[0];
      state.routines.splice(ti,0,moved);
      dragSrcId=null;persist();render();
    });
  });
}

// Menüs bei Klick außerhalb schließen
document.addEventListener('click',e=>{
  let needsRender=false;
  if(ui.menuOpen!==null&&!e.target.closest('.rcard-actions')){ui.menuOpen=null;needsRender=true;}
  if(ui.settingsOpen&&!e.target.closest('.settings-wrap')){ui.settingsOpen=false;needsRender=true;}
  if(needsRender)render();
});

if(!ui.expanded)ui.expanded=new Set(state.routines.map(r=>r.id));
render();
</script>
</body>
</html>
