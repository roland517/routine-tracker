<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Routinen">
<title>Routinen-Tracker</title>
<style>
:root {
  --purple:#7F77DD;--purple-light:#EEEDFE;--purple-mid:#AFA9EC;--purple-dark:#534AB7;--purple-darker:#3C3489;
  --green:#1D9E75;--green-light:#E1F5EE;--amber:#BA7517;--amber-light:#FAEEDA;
  --red-bg:#FCEBEB;--red-border:#F09595;--red-text:#A32D2D;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --bg:#f5f5f5;--card:#fff;--border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --radius:12px;--radius-sm:8px;--radius-pill:99px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root{
  --text:#f0f0f0;--text2:#aaa;--text3:#666;
  --bg:#111;--card:#1e1e1e;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
  --purple-light:#2a2750;--green-light:#0d2e22;--amber-light:#2a1e06;
  --red-bg:#2a1010;--red-border:#6b2020;--red-text:#f09595;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:var(--text)}
body{padding-top:calc(var(--safe-top) + 0px);padding-bottom:var(--safe-bottom)}
.app{max-width:430px;margin:0 auto;padding:16px 16px 32px}
h1{font-size:28px;font-weight:700;margin-bottom:4px}
.subtitle{font-size:13px;color:var(--text2);margin-bottom:20px}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.stat-box{background:var(--card);border-radius:var(--radius-sm);padding:10px 12px;border:0.5px solid var(--border)}
.stat-label{font-size:10px;color:var(--text2);margin-bottom:3px;font-weight:500}
.stat-val{font-size:22px;font-weight:600;color:var(--text)}
.stat-sub{font-size:10px;color:var(--text3);margin-top:1px}

/* Week nav */
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:14px;background:var(--card);border-radius:var(--radius);padding:8px 12px;border:0.5px solid var(--border)}
.nav-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:20px;padding:2px 6px;border-radius:6px;line-height:1}
.nav-btn:active{background:var(--border)}
.week-lbl{flex:1;text-align:center;font-size:13px;font-weight:600;color:var(--text)}

/* Routine card */
.rcard{background:var(--card);border-radius:var(--radius);border:0.5px solid var(--border);margin-bottom:10px;overflow:hidden}
.rcard-header{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer}
.drag-handle{color:var(--text3);font-size:18px;padding:2px;touch-action:none;flex-shrink:0;cursor:grab}
.rcard-icon{width:34px;height:34px;border-radius:8px;background:var(--purple-light);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.rcard-info{flex:1;min-width:0}
.rcard-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rcard-meta{font-size:11px;color:var(--text2);margin-top:1px}
.rcard-actions{display:flex;gap:2px;flex-shrink:0}
.act-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:5px;border-radius:6px;line-height:1}
.act-btn:active{background:var(--border);color:var(--text)}
.chevron{font-size:12px;color:var(--text3);transition:transform 0.2s;margin-left:2px}
.chevron.open{transform:rotate(180deg)}

/* Card body */
.rcard-body{border-top:0.5px solid var(--border);padding:12px 14px}
.phase-tabs{display:flex;gap:6px;margin-bottom:10px}
.phase-tab{flex:1;padding:7px 0;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:none;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .15s}
.phase-tab.active{background:var(--purple-light);border-color:var(--purple-mid);color:var(--purple-darker)}
.phase-hint{font-size:11px;color:var(--text3);text-align:center;margin-bottom:10px}

/* Goal badge */
.goal-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.goal-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:var(--radius-pill);border:1px solid}
.goal-badge.met{background:var(--green-light);border-color:var(--green);color:var(--green)}
.goal-badge.partial{background:var(--amber-light);border-color:var(--amber);color:var(--amber)}
.goal-badge.missed{background:var(--red-bg);border-color:var(--red-border);color:var(--red-text)}
.goal-badge.pending{background:var(--purple-light);border-color:var(--purple-mid);color:var(--purple-darker)}

/* Day pills */
.day-row{display:flex;gap:5px;justify-content:center;margin-bottom:12px}
.day-pill{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;user-select:none;transition:all .12s;position:relative}
.day-pill .dn{font-size:9px;font-weight:700;color:var(--text2)}
.day-pill .dd{font-size:9px;color:var(--text3)}
.day-pill.planned{border-color:var(--purple)}
.day-pill.planned .dn,.day-pill.planned .dd{color:var(--purple-dark)}
.day-pill.done{background:var(--purple);border-color:var(--purple)}
.day-pill.done .dn,.day-pill.done .dd{color:white}
.day-pill.is-today::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--purple)}
.day-pill.done.is-today::after{background:rgba(255,255,255,.7)}
.day-pill:active{transform:scale(0.92)}

/* Progress */
.prog-wrap{margin-bottom:8px}
.prog-row{display:flex;justify-content:space-between;margin-bottom:5px}
.prog-lbl{font-size:11px;color:var(--text2)}
.prog-num{font-size:11px;font-weight:600;color:var(--text)}
.prog-bg{background:var(--bg);border-radius:var(--radius-pill);height:5px;overflow:hidden}
.prog-fill{height:5px;border-radius:var(--radius-pill);transition:width .4s}
.prog-fill.met{background:var(--green)}
.prog-fill.partial{background:var(--amber)}
.prog-fill.missed{background:var(--red-text)}
.prog-fill.pending{background:var(--purple)}

/* History */
.hist-section{margin-top:10px;border-top:0.5px solid var(--border);padding-top:10px}
.hist-title{font-size:10px;font-weight:700;letter-spacing:.07em;color:var(--text3);text-transform:uppercase;margin-bottom:8px}
.hist-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.hist-kw{font-size:11px;font-weight:600;min-width:38px;color:var(--text2)}
.hist-pills{display:flex;gap:3px;flex:1}
.hp{width:22px;height:22px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:var(--text3)}
.hp.d{background:var(--purple);border-color:var(--purple);color:white}
.hp.m{background:var(--red-bg);border-color:var(--red-border);color:var(--red-text)}
.hist-score{font-size:11px;font-weight:600;min-width:40px;text-align:right;color:var(--text)}
.hist-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hist-dot.met{background:var(--green)}
.hist-dot.partial{background:var(--amber)}
.hist-dot.missed{background:var(--red-text)}

/* FAB */
.fab{position:fixed;bottom:calc(24px + var(--safe-bottom));right:20px;width:56px;height:56px;border-radius:50%;background:var(--purple);border:none;cursor:pointer;font-size:26px;color:white;display:flex;align-items:center;justify-content:center;z-index:100;transition:transform .15s}
.fab:active{transform:scale(0.93)}

/* Sheet */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end}
.sheet{background:var(--card);border-radius:20px 20px 0 0;padding:0 16px calc(24px + var(--safe-bottom));width:100%;max-height:90vh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:10px auto 16px}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:16px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.05em}
.form-input{width:100%;font-size:16px;padding:10px 12px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);margin-bottom:14px;-webkit-appearance:none}
.form-input:focus{outline:2px solid var(--purple);border-color:transparent}

/* Goal stepper */
.goal-stepper{display:flex;align-items:center;gap:0;margin-bottom:16px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;background:var(--bg)}
.step-btn{background:none;border:none;cursor:pointer;font-size:22px;font-weight:300;color:var(--purple);width:48px;height:44px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-btn:active{background:var(--border)}
.step-val{flex:1;text-align:center;font-size:16px;font-weight:700;color:var(--text)}
.step-lbl{font-size:12px;color:var(--text2);font-weight:400}

/* Icon grid */
.icon-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.ico-btn{width:40px;height:40px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:all .1s}
.ico-btn.sel{border-color:var(--purple);border-width:2px;background:var(--purple-light)}
.ico-btn:active{transform:scale(0.88)}
.ico-del{position:absolute;top:-5px;right:-5px;width:16px;height:16px;border-radius:50%;background:#E24B4A;color:white;font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center;cursor:pointer;line-height:1;border:1.5px solid var(--card)}
.ico-btn.manage-mode .ico-del{display:flex}
.emoji-add-row{display:flex;gap:8px;margin-bottom:16px}
.emoji-inp{flex:1;font-size:22px;padding:8px 10px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);text-align:center;-webkit-appearance:none}
.emoji-inp:focus{outline:2px solid var(--purple);border-color:transparent}
.btn-add-emoji{background:var(--purple);color:white;border:none;border-radius:var(--radius-sm);padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.day-sel-row{display:flex;gap:6px;justify-content:center;margin-bottom:16px}
.ds-btn{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border2);background:none;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .12s}
.ds-btn.sel{background:var(--purple);border-color:var(--purple);color:white}
.ds-btn:active{transform:scale(0.88)}
.btn-row{display:flex;gap:8px;margin-top:4px}
.btn-main{flex:2;background:var(--purple);color:white;border:none;border-radius:var(--radius-sm);padding:13px;font-size:15px;font-weight:700;cursor:pointer}
.btn-main:active{background:var(--purple-dark)}
.btn-cancel{flex:1;background:none;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:13px;font-size:15px;font-weight:600;color:var(--text2);cursor:pointer}
.btn-cancel:active{background:var(--border)}
.manage-toggle{font-size:12px;color:var(--purple);cursor:pointer;margin-bottom:10px;font-weight:600}
.section-sep{height:0.5px;background:var(--border);margin:14px 0}

/* Backup-Bar */
.backup-bar{display:flex;gap:8px;margin-bottom:20px}
.backup-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 0;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:0.5px solid var(--border2);background:var(--card);color:var(--text2);transition:all .15s}
.backup-btn:active{background:var(--border)}
.backup-btn.export{color:var(--purple);border-color:var(--purple-mid);background:var(--purple-light)}
.backup-btn.import{color:var(--green);border-color:var(--green);background:var(--green-light)}
.toast{position:fixed;bottom:calc(90px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:#222;color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:var(--radius-pill);z-index:999;opacity:0;transition:opacity .25s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const DAYS=['Mo','Di','Mi','Do','Fr','Sa','So'];
const LS_KEY='routinen_tracker_v1';
const DEFAULT_ICONS=['🏋️','🧘','📚','✍️','🎯','🧠','💧','🥗','😴','🚴','🎵','🧹','💼','🌿','🛁','🐕','🏃','🍎','💪','🔬','🧴','🫀','🦷','☕','🛒'];

// ── Migration: fehlende Felder sicher ergänzen ────────────────────────────────
function migrate(raw) {
  if (!raw.icons) raw.icons = [...DEFAULT_ICONS];
  if (!raw.routines) raw.routines = [];
  raw.routines.forEach(r => {
    if (!r.phase) r.phase = {};
    if (!r.weeks) r.weeks = {};
    if (typeof r.goalPerWeek !== 'number') r.goalPerWeek = 3; // NEU: Standardziel 3×/Woche
  });
  return raw;
}

function loadState() {
  try { const raw=localStorage.getItem(LS_KEY); if(raw) return migrate(JSON.parse(raw)); } catch(e){}
  return null;
}
function saveState() { try{localStorage.setItem(LS_KEY,JSON.stringify(state));}catch(e){} }

let saved=loadState();
let nextId=saved?(saved.nextId||2):2;
let state=saved||{
  weekOffset:0,
  icons:[...DEFAULT_ICONS],
  routines:[{id:1,name:'Training (PT/Maschine)',icon:'🏋️',goalPerWeek:3,phase:{},weeks:{}}]
};

let ui={sheet:null,sheetData:null,manageIcons:false,expanded:null};

// ── Helpers ───────────────────────────────────────────────────────────────────
function getMonday(offset){
  const t=new Date();t.setHours(0,0,0,0);
  const d=t.getDay();const diff=d===0?-6:1-d;
  t.setDate(t.getDate()+diff+offset*7);return t;
}
function getWeekDates(offset){
  const m=getMonday(offset);
  return Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d;});
}
function isoWeek(d){
  const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  t.setUTCDate(t.getUTCDate()+4-(t.getUTCDay()||7));
  const y=new Date(Date.UTC(t.getUTCFullYear(),0,1));
  return Math.ceil(((t-y)/86400000+1)/7);
}
function weekKey(offset){
  const m=getMonday(offset);
  return m.getFullYear()+'-W'+String(isoWeek(m)).padStart(2,'0');
}
function fmtRange(offset){
  const ds=getWeekDates(offset);
  const f=d=>d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});
  return 'KW '+isoWeek(ds[0])+' · '+f(ds[0])+'–'+f(ds[6]);
}
function getWk(r,offset){
  const k=weekKey(offset);
  if(!r.weeks[k])r.weeks[k]={planned:[],done:[]};
  return r.weeks[k];
}
function getPhase(r,offset){
  const k=weekKey(offset);if(!r.phase[k])r.phase[k]='plan';return r.phase[k];
}
function setPhase(r,offset,v){r.phase[weekKey(offset)]=v;}

// Zielbewertung einer Woche
function goalStatus(done, goal, isCurrentWeek, plannedCount) {
  if (isCurrentWeek) {
    // Laufende Woche: Ziel noch erreichbar?
    if (done >= goal) return 'met';
    return 'pending';
  }
  // Abgeschlossene Woche
  if (done >= goal) return 'met';
  if (done >= goal * 0.5) return 'partial';
  return 'missed';
}
function goalLabel(status, done, goal) {
  if (status==='met') return `✓ Ziel erreicht (${done}/${goal}×)`;
  if (status==='partial') return `~ Teilweise (${done}/${goal}×)`;
  if (status==='missed') return `✗ Ziel verfehlt (${done}/${goal}×)`;
  return `Ziel: ${done}/${goal}×`;
}

function routineStats(r){
  let tp=0,td=0,weeksMetGoal=0,weeksCounted=0;
  const currKey=weekKey(state.weekOffset);
  Object.entries(r.weeks).forEach(([k,w])=>{
    tp+=w.planned.length;td+=w.done.length;
    if(k!==currKey&&w.planned.length>0){
      weeksCounted++;
      if(w.done.length>=r.goalPerWeek)weeksMetGoal++;
    }
  });
  return{tp,td,weeksMetGoal,weeksCounted};
}
function globalStats(){
  let tp=0,td=0;const wks=new Set();
  let weeksMetGoal=0,weeksCounted=0;
  state.routines.forEach(r=>{
    const s=routineStats(r);tp+=s.tp;td+=s.td;
    weeksMetGoal+=s.weeksMetGoal;weeksCounted+=s.weeksCounted;
    Object.keys(r.weeks).forEach(k=>{if(r.weeks[k].planned.length>0)wks.add(k);});
  });
  return{tp,td,weeks:wks.size,weeksMetGoal,weeksCounted};
}
function historyKeys(r){
  const curr=weekKey(state.weekOffset);
  return Object.keys(r.weeks).filter(k=>k!==curr&&r.weeks[k].planned.length>0).sort().reverse().slice(0,6);
}
function persist(){state.nextId=nextId;saveState();}

// ── Export / Import ───────────────────────────────────────────────────────────
function showToast(msg, duration=2400) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function exportData() {
  const payload = {
    exportedAt: new Date().toISOString(),
    appVersion: 'routinen_tracker_v1',
    data: state
  };
  const json = JSON.stringify(payload, null, 2);
  const blob = new Blob([json], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const date = new Date().toISOString().slice(0,10);
  const a = document.createElement('a');
  a.href = url;
  a.download = `routinen-backup-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Backup gespeichert');
}

function importData(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      // Unterstützt direktes State-Objekt oder eingepacktes Export-Format
      const raw = parsed.data || parsed;
      if (!raw.routines || !Array.isArray(raw.routines)) {
        showToast('⚠ Ungültige Backup-Datei');
        return;
      }
      const confirmed = confirm(
        `Backup vom ${parsed.exportedAt ? new Date(parsed.exportedAt).toLocaleDateString('de-DE') : 'unbekannten Datum'} laden?\n\n` +
        `${raw.routines.length} Routine(n) gefunden.\n\nAktuelle Daten werden überschrieben.`
      );
      if (!confirmed) return;
      const migrated = migrate(raw);
      Object.assign(state, migrated);
      nextId = state.nextId || (Math.max(0, ...state.routines.map(r => r.id)) + 1);
      persist();
      ui.expanded = new Set(state.routines.map(r => r.id));
      render();
      showToast(`✓ ${state.routines.length} Routine(n) importiert`);
    } catch(err) {
      showToast('⚠ Datei konnte nicht gelesen werden');
    }
  };
  reader.readAsText(file);
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  const today=new Date();today.setHours(0,0,0,0);
  const dates=getWeekDates(state.weekOffset);
  const gs=globalStats();
  const app=document.getElementById('app');
  const goalRate=gs.weeksCounted>0?Math.round(gs.weeksMetGoal/gs.weeksCounted*100):0;

  let html=`<h1>Routinen</h1><p class="subtitle">Wochenplanung & Tracking</p>`;
  html+=`<div class="backup-bar">
    <button class="backup-btn export" id="btn-export">⬆ Exportieren</button>
    <button class="backup-btn import" id="btn-import">⬇ Importieren</button>
  </div>`;
  html+=`<div class="stats-grid">
    <div class="stat-box"><div class="stat-label">Erledigt</div><div class="stat-val">${gs.td}</div><div class="stat-sub">Einheiten</div></div>
    <div class="stat-box"><div class="stat-label">Ziel erreicht</div><div class="stat-val">${goalRate}%</div><div class="stat-sub">der Wochen</div></div>
    <div class="stat-box"><div class="stat-label">Gesamtquote</div><div class="stat-val">${gs.tp>0?Math.round(gs.td/gs.tp*100):0}%</div><div class="stat-sub">geplant→erledigt</div></div>
  </div>`;
  html+=`<div class="week-nav">
    <button class="nav-btn" id="btn-prev">‹</button>
    <span class="week-lbl">${fmtRange(state.weekOffset)}</span>
    <button class="nav-btn" id="btn-next">›</button>
  </div>`;

  if(!ui.expanded)ui.expanded=new Set(state.routines.map(r=>r.id));

  state.routines.forEach(r=>{
    const wk=getWk(r,state.weekOffset);
    const phase=getPhase(r,state.weekOffset);
    const isCurrentWeek=state.weekOffset===0;
    const status=goalStatus(wk.done.length,r.goalPerWeek,isCurrentWeek,wk.planned.length);
    const pct=Math.min(100,Math.round(wk.done.length/r.goalPerWeek*100));
    const barPct=Math.min(100,pct);
    const {tp,td,weeksMetGoal,weeksCounted}=routineStats(r);
    const hkeys=historyKeys(r);
    const isOpen=ui.expanded.has(r.id);

    html+=`<div class="rcard" data-rid="${r.id}">
      <div class="rcard-header" data-toggle="${r.id}">
        <span class="drag-handle">⠿</span>
        <div class="rcard-icon">${r.icon}</div>
        <div class="rcard-info">
          <div class="rcard-name">${r.name}</div>
          <div class="rcard-meta">Ziel: ${r.goalPerWeek}×/Woche · ${weeksCounted>0?Math.round(weeksMetGoal/weeksCounted*100):0}% Zielquote</div>
        </div>
        <div class="rcard-actions">
          <button class="act-btn" data-edit="${r.id}">✏️</button>
          <button class="act-btn" data-del="${r.id}">🗑</button>
        </div>
        <span class="chevron${isOpen?' open':''}">▼</span>
      </div>`;

    if(isOpen){
      html+=`<div class="rcard-body">
        <div class="phase-tabs">
          <button class="phase-tab${phase==='plan'?' active':''}" data-phase="${r.id}" data-val="plan">📅 Planen</button>
          <button class="phase-tab${phase==='track'?' active':''}" data-phase="${r.id}" data-val="track">✅ Abhaken</button>
        </div>
        <div class="phase-hint">${phase==='plan'?'Tippe auf Tage, die du einplanen möchtest':'Tippe auf geplante Tage, um sie abzuhaken'}</div>
        <div class="day-row">`;

      dates.forEach((date,i)=>{
        const isP=wk.planned.includes(i);
        const isD=wk.done.includes(i);
        const isToday=date.getTime()===today.getTime();
        let cls='day-pill';
        if(isD)cls+=' done';else if(isP)cls+=' planned';
        if(isToday)cls+=' is-today';
        html+=`<div class="${cls}" data-dp="${r.id}" data-di="${i}">
          <span class="dn">${DAYS[i]}</span><span class="dd">${date.getDate()}</span>
        </div>`;
      });

      html+=`</div>`;

      // Ziel-Badge + Fortschrittsbalken
      html+=`<div class="goal-row">
        <span class="goal-badge ${status}">${goalLabel(status,wk.done.length,r.goalPerWeek)}</span>
      </div>`;
      html+=`<div class="prog-wrap">
        <div class="prog-row">
          <span class="prog-lbl">Fortschritt zum Ziel</span>
          <span class="prog-num">${wk.done.length}/${r.goalPerWeek}× (${pct}%)</span>
        </div>
        <div class="prog-bg"><div class="prog-fill ${status}" style="width:${barPct}%"></div></div>
      </div>`;

      if(hkeys.length>0){
        html+=`<div class="hist-section"><div class="hist-title">Historie</div>`;
        hkeys.forEach(k=>{
          const w=r.weeks[k];
          const knum=k.split('-W')[1];
          const hStatus=goalStatus(w.done.length,r.goalPerWeek,false,w.planned.length);
          html+=`<div class="hist-row">
            <span class="hist-kw">KW ${knum}</span>
            <div class="hist-pills">`;
          DAYS.forEach((_,i)=>{
            const isD2=w.done.includes(i);const isM=w.planned.includes(i)&&!isD2;
            html+=`<div class="hp${isD2?' d':isM?' m':''}">${DAYS[i]}</div>`;
          });
          html+=`</div>
            <div class="hist-dot ${hStatus}"></div>
            <span class="hist-score">${w.done.length}/${r.goalPerWeek}×</span>
          </div>`;
        });
        html+=`</div>`;
      }
      html+=`</div>`;
    }
    html+=`</div>`;
  });

  html+=`<div style="height:80px"></div>`;
  html+=`<button class="fab" id="fab-add">+</button>`;
  html+=`<div class="toast" id="toast"></div>`;
  html+=`<input type="file" id="import-file" accept=".json" style="display:none">`;

  if(ui.sheet)html+=renderSheet();
  app.innerHTML=html;
  bindEvents();
}

function renderSheet(){
  const d=ui.sheetData;
  let html=`<div class="sheet-bg" id="sheet-bg"><div class="sheet"><div class="sheet-handle"></div>`;
  const title=d.mode==='add'?'Neue Routine':'Routine bearbeiten';
  html+=`<div class="sheet-title">${title}</div>`;
  html+=`<label class="form-label">Name</label>
    <input class="form-input" id="s-name" type="text" value="${d.name||''}" placeholder="z. B. Lesen, Meditation …">`;

  // Zielwert-Stepper
  html+=`<label class="form-label">Wochenziel</label>
    <div class="goal-stepper">
      <button class="step-btn" id="step-down">−</button>
      <span class="step-val" id="step-val">${d.goalPerWeek}× <span class="step-lbl">pro Woche</span></span>
      <button class="step-btn" id="step-up">+</button>
    </div>`;

  html+=`<label class="form-label">Symbol</label>`;
  html+=`<div class="manage-toggle" id="toggle-manage">${ui.manageIcons?'✓ Fertig':'✏️ Symbole verwalten'}</div>`;
  html+=`<div class="icon-grid">`;
  state.icons.forEach((ic,idx)=>{
    const isSel=d.icon===ic;
    const mgm=ui.manageIcons?' manage-mode':'';
    html+=`<div class="ico-btn${isSel?' sel':''}${mgm}" data-pick="${ic}">${ic}<span class="ico-del" data-rmico="${idx}">×</span></div>`;
  });
  html+=`</div><div class="section-sep"></div>`;
  html+=`<label class="form-label">Eigenes Emoji hinzufügen</label>
    <div class="emoji-add-row">
      <input class="emoji-inp" id="emoji-inp" type="text" placeholder="🎾" maxlength="4">
      <button class="btn-add-emoji" id="btn-add-emoji">Hinzufügen</button>
    </div>`;
  html+=`<label class="form-label">Starttage diese Woche</label>
    <div class="day-sel-row">`;
  DAYS.forEach((day,i)=>{html+=`<button class="ds-btn${d.days.includes(i)?' sel':''}" data-dsel="${i}">${day}</button>`;});
  html+=`</div>
    <div class="btn-row">
      <button class="btn-main" id="btn-sheet-save">${d.mode==='add'?'Hinzufügen':'Speichern'}</button>
      <button class="btn-cancel" id="btn-sheet-cancel">Abbrechen</button>
    </div></div></div>`;
  return html;
}

// ── Events ────────────────────────────────────────────────────────────────────
function bindEvents(){
  const el=id=>document.getElementById(id);
  const q=s=>document.querySelectorAll(s);
  const saveName=()=>{const n=el('s-name');if(n&&ui.sheetData)ui.sheetData.name=n.value;};

  el('btn-prev')&&(el('btn-prev').onclick=()=>{state.weekOffset--;persist();render();});
  el('btn-next')&&(el('btn-next').onclick=()=>{state.weekOffset++;persist();render();});

  el('btn-export')&&(el('btn-export').onclick=()=>exportData());
  el('btn-import')&&(el('btn-import').onclick=()=>el('import-file')&&el('import-file').click());
  el('import-file')&&(el('import-file').onchange=e=>{
    importData(e.target.files[0]);
    e.target.value=''; // Reset damit dieselbe Datei nochmal gewählt werden kann
  });
  el('fab-add')&&(el('fab-add').onclick=()=>{
    ui.sheet='add';ui.manageIcons=false;
    ui.sheetData={mode:'add',name:'',icon:state.icons[0]||'🏋️',goalPerWeek:3,days:[0,2,4]};
    render();setTimeout(()=>el('s-name')&&el('s-name').focus(),80);
  });

  q('[data-toggle]').forEach(h=>{
    h.onclick=e=>{
      if(e.target.closest('[data-edit],[data-del],[data-phase],[data-dp],.drag-handle'))return;
      const rid=parseInt(h.dataset.toggle);
      if(!ui.expanded)ui.expanded=new Set();
      if(ui.expanded.has(rid))ui.expanded.delete(rid);else ui.expanded.add(rid);
      render();
    };
  });

  q('[data-phase]').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      const r=state.routines.find(x=>x.id===parseInt(btn.dataset.phase));
      if(r){setPhase(r,state.weekOffset,btn.dataset.val);persist();render();}
    };
  });

  q('[data-dp]').forEach(pill=>{
    pill.onclick=e=>{
      e.stopPropagation();
      const r=state.routines.find(x=>x.id===parseInt(pill.dataset.dp));if(!r)return;
      const di=parseInt(pill.dataset.di);
      const wk=getWk(r,state.weekOffset);
      const phase=getPhase(r,state.weekOffset);
      if(phase==='plan'){
        if(wk.planned.includes(di)){wk.planned=wk.planned.filter(d=>d!==di);wk.done=wk.done.filter(d=>d!==di);}
        else wk.planned.push(di);
      }else{
        if(!wk.planned.includes(di))return;
        if(wk.done.includes(di))wk.done=wk.done.filter(d=>d!==di);else wk.done.push(di);
      }
      persist();render();
    };
  });

  q('[data-edit]').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      const r=state.routines.find(x=>x.id===parseInt(btn.dataset.edit));if(!r)return;
      ui.sheet='edit';ui.manageIcons=false;
      ui.sheetData={mode:'edit',id:r.id,name:r.name,icon:r.icon,goalPerWeek:r.goalPerWeek||3,days:[]};
      render();
    };
  });

  q('[data-del]').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      if(confirm('Routine löschen?')){
        state.routines=state.routines.filter(x=>x.id!==parseInt(btn.dataset.del));
        persist();render();
      }
    };
  });

  if(ui.sheet){
    el('sheet-bg')&&(el('sheet-bg').onclick=e=>{if(e.target===el('sheet-bg')){ui.sheet=null;render();}});
    el('btn-sheet-cancel')&&(el('btn-sheet-cancel').onclick=()=>{ui.sheet=null;render();});

    el('step-down')&&(el('step-down').onclick=()=>{
      saveName();
      if(ui.sheetData.goalPerWeek>1)ui.sheetData.goalPerWeek--;
      render();
    });
    el('step-up')&&(el('step-up').onclick=()=>{
      saveName();
      if(ui.sheetData.goalPerWeek<7)ui.sheetData.goalPerWeek++;
      render();
    });

    el('toggle-manage')&&(el('toggle-manage').onclick=()=>{
      ui.manageIcons=!ui.manageIcons;saveName();render();
    });

    q('[data-pick]').forEach(b=>{
      b.onclick=e=>{
        if(e.target.closest('[data-rmico]'))return;
        ui.sheetData.icon=b.dataset.pick;saveName();render();
      };
    });

    q('[data-rmico]').forEach(btn=>{
      btn.onclick=e=>{
        e.stopPropagation();
        const idx=parseInt(btn.dataset.rmico);
        const ic=state.icons[idx];
        if(state.routines.some(r=>r.icon===ic)){alert('Dieses Symbol wird von einer Routine verwendet.');return;}
        state.icons.splice(idx,1);
        if(ui.sheetData.icon===ic)ui.sheetData.icon=state.icons[0]||'';
        saveName();persist();render();
      };
    });

    el('btn-add-emoji')&&(el('btn-add-emoji').onclick=()=>{
      const inp=el('emoji-inp');if(!inp)return;
      const val=inp.value.trim();if(!val)return;
      if(!state.icons.includes(val))state.icons.push(val);
      ui.sheetData.icon=val;saveName();persist();render();
    });

    q('[data-dsel]').forEach(b=>{
      b.onclick=()=>{
        const i=parseInt(b.dataset.dsel);
        const d=ui.sheetData.days;
        if(d.includes(i))ui.sheetData.days=d.filter(x=>x!==i);else ui.sheetData.days=[...d,i].sort();
        saveName();render();
      };
    });

    el('btn-sheet-save')&&(el('btn-sheet-save').onclick=()=>{
      const name=(el('s-name').value||'').trim();
      if(!name){el('s-name').focus();return;}
      const d=ui.sheetData;
      if(d.mode==='add'){
        const r={id:nextId++,name,icon:d.icon,goalPerWeek:d.goalPerWeek,phase:{},weeks:{}};
        const wk=getWk(r,state.weekOffset);
        d.days.forEach(i=>wk.planned.push(i));
        state.routines.push(r);
      }else{
        const r=state.routines.find(x=>x.id===d.id);
        if(r){r.name=name;r.icon=d.icon;r.goalPerWeek=d.goalPerWeek;}
      }
      ui.sheet=null;persist();render();
    });
  }

  // Drag & Drop
  let dragSrcId=null;
  q('.rcard[data-rid]').forEach(card=>{
    card.addEventListener('dragstart',e=>{dragSrcId=parseInt(card.dataset.rid);card.style.opacity='.45';e.dataTransfer.effectAllowed='move';});
    card.addEventListener('dragend',()=>{card.style.opacity='';q('.rcard').forEach(c=>c.style.borderColor='');});
    card.addEventListener('dragover',e=>{e.preventDefault();card.style.borderColor='var(--purple)';});
    card.addEventListener('dragleave',()=>{card.style.borderColor='';});
    card.addEventListener('drop',e=>{
      e.preventDefault();card.style.borderColor='';
      const toId=parseInt(card.dataset.rid);
      if(!dragSrcId||dragSrcId===toId)return;
      const fi=state.routines.findIndex(x=>x.id===dragSrcId);
      const ti=state.routines.findIndex(x=>x.id===toId);
      if(fi<0||ti<0)return;
      const moved=state.routines.splice(fi,1)[0];
      state.routines.splice(ti,0,moved);
      dragSrcId=null;persist();render();
    });
  });
}

if(!ui.expanded)ui.expanded=new Set(state.routines.map(r=>r.id));
render();
</script>
</body>
</html>
